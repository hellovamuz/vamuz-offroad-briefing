it.\n            Book and pay before you arrive — you can be turned back at the barge.\n            <a class=\"inline-link\" href=\"https://parks.qld.gov.au/management/managed-areas/recreation/vehicle-permits\" target=\"_blank\" rel=\"noopener\">QLD Parks vehicle permits ↗<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdetails>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ────────────────────────────────────────────\n         04 — PRE-TRIP CHECKLIST\n         ──────────────────────────────────────────── -->\n    <section class=\"section section--checklist\" id=\"section-checklist\" data-screen-label=\"04 Pre-Trip Checklist\">\n      <header class=\"section__header\">\n        <span class=\"section__num\">04<\u002Fspan>\n        <div class=\"section__head-text\">\n          <h2 class=\"section__title\">Pre-Trip Checklist<\u002Fh2>\n          <p class=\"section__kicker\">Tick everything. All ticks required to submit.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fheader>\n\n      <p class=\"section__intro\">\n        These are the things we need to know you've covered before pickup. The\n        beach driving video is a hard requirement — not a suggestion.\n      <\u002Fp>\n\n      <form class=\"checklist\" id=\"checklistForm\" novalidate=\"\">\n\n        <!-- Checklist items — each is a data-check item -->\n        <label class=\"check\" data-check=\"video\">\n          <input type=\"checkbox\" name=\"check_video\">\n          <span class=\"check__box\" aria-hidden=\"true\"><\u002Fspan>\n          <span class=\"check__body\">\n            <span class=\"check__title\">Watched the Beach Driving Guide video in full<\u002Fspan>\n            <span class=\"check__desc\">\n              Full video embedded above. Covers tyre pressure, soft sand\n              technique, recovery, and what to do if you get bogged.\n              <strong>Mandatory before any beach driving.<\u002Fstrong>\n            <\u002Fspan>\n          <\u002Fspan>\n        <\u002Flabel>\n\n        <label class=\"check\" data-check=\"myway\">\n          <input type=\"checkbox\" name=\"check_myway\">\n          <span class=\"check__box\" aria-hidden=\"true\"><\u002Fspan>\n          <span class=\"check__body\">\n            <span class=\"check__title\">I understand beach driving is not covered by MyWay Protect<\u002Fspan>\n            <span class=\"check__desc\">\n              Any damage on the beach — getting bogged, wave/tidal damage, sea\n              movement — is my personal liability under the PDS exclusions.\n            <\u002Fspan>\n          <\u002Fspan>\n        <\u002Flabel>\n\n        <label class=\"check\" data-check=\"tyres\">\n          <input type=\"checkbox\" name=\"check_tyres\">\n          <span class=\"check__box\" aria-hidden=\"true\"><\u002Fspan>\n          <span class=\"check__body\">\n            <span class=\"check__title\">I know how to deflate &amp; re-inflate tyres for sand<\u002Fspan>\n            <span class=\"check__desc\">\n              Target: 16–20 PSI for soft sand. Back to 40 PSI before sealed\n              roads. I'll use the compressor and deflator in the recovery bag.\n            <\u002Fspan>\n          <\u002Fspan>\n        <\u002Flabel>\n\n        <label class=\"check\" data-check=\"modes\">\n          <input type=\"checkbox\" name=\"check_modes\">\n          <span class=\"check__box\" aria-hidden=\"true\"><\u002Fspan>\n          <span class=\"check__body\">\n            <span class=\"check__title\">I understand the 4WD transfer &amp; terrain modes<\u002Fspan>\n            <span class=\"check__desc\">\n              2H for roads. 4H for beach / unsealed. 4L for extreme only.\n              Sand mode for soft sand, Mud mode for bogs. I'll select the right\n              mode <em>before<\u002Fem> I need traction.\n            <\u002Fspan>\n          <\u002Fspan>\n        <\u002Flabel>\n\n        <label class=\"check\" data-check=\"tides\">\n          <input type=\"checkbox\" name=\"check_tides\">\n          <span class=\"check__box\" aria-hidden=\"true\"><\u002Fspan>\n          <span class=\"check__body\">\n            <span class=\"check__title\">I've checked tides for any beach destinations<\u002Fspan>\n            <span class=\"check__desc\">\n              I'll check a tide chart before driving on the beach and won't\n              drive at or near high tide.\n              <a class=\"inline-link\" href=\"https://tides.willyweather.com.au/qld.html\" target=\"_blank\" rel=\"noopener\">Willy Weather QLD tides ↗<\u002Fa>\n            <\u002Fspan>\n          <\u002Fspan>\n        <\u002Flabel>\n\n        <label class=\"check\" data-check=\"recovery\">\n          <input type=\"checkbox\" name=\"check_recovery\">\n          <span class=\"check__box\" aria-hidden=\"true\"><\u002Fspan>\n          <span class=\"check__body\">\n            <span class=\"check__title\">I know where the recovery gear is and how to use it<\u002Fspan>\n            <span class=\"check__desc\">\n              Recovery boards, tow strap, and compressor are in the canopy.\n              I'll ask for a walkthrough at pickup if I've never used recovery\n              gear before.\n            <\u002Fspan>\n          <\u002Fspan>\n        <\u002Flabel>\n\n        <label class=\"check\" data-check=\"permits\">\n          <input type=\"checkbox\" name=\"check_permits\">\n          <span class=\"check__box\" aria-hidden=\"true\"><\u002Fspan>\n          <span class=\"check__body\">\n            <span class=\"check__title\">I've checked national park access permit requirements<\u002Fspan>\n            <span class=\"check__desc\">\n              K'gari, Teewah Beach, and other national parks require a vehicle\n              access permit. I'll book this before I arrive.\n              <a class=\"inline-link\" href=\"https://parks.qld.gov.au/management/managed-areas/recreation/vehicle-permits\" target=\"_blank\" rel=\"noopener\">QLD Parks vehicle permits ↗<\u002Fa>\n            <\u002Fspan>\n          <\u002Fspan>\n        <\u002Flabel>\n\n        <label class=\"check\" data-check=\"notify\">\n          <input type=\"checkbox\" name=\"check_notify\">\n          <span class=\"check__box\" aria-hidden=\"true\"><\u002Fspan>\n          <span class=\"check__body\">\n            <span class=\"check__title\">I'll notify Vamuz of my planned off-road destinations before pickup<\u002Fspan>\n            <span class=\"check__desc\">\n              So Chris can confirm access for Vamuz II and flag any current\n              embargos or closures. There's a field for this below.\n            <\u002Fspan>\n          <\u002Fspan>\n        <\u002Flabel>\n\n        <label class=\"check\" data-check=\"liability\">\n          <input type=\"checkbox\" name=\"check_liability\">\n          <span class=\"check__box\" aria-hidden=\"true\"><\u002Fspan>\n          <span class=\"check__body\">\n            <span class=\"check__title\">I understand scratches, wheel damage and tyre punctures are my liability<\u002Fspan>\n            <span class=\"check__desc\">\n              I'll drive to the conditions, go slow on tight tracks, and walk\n              a line I'm unsure about before driving it.\n            <\u002Fspan>\n          <\u002Fspan>\n        <\u002Flabel>\n\n        <label class=\"check\" data-check=\"rinse\">\n          <input type=\"checkbox\" name=\"check_rinse\">\n          <span class=\"check__box\" aria-hidden=\"true\"><\u002Fspan>\n          <span class=\"check__body\">\n            <span class=\"check__title\">I'll rinse the underbody and remove sand/salt after beach driving<\u002Fspan>\n            <span class=\"check__desc\">\n              A quick underbody wash before returning the vehicle is genuinely\n              appreciated and helps keep Vamuz II in good condition.\n            <\u002Fspan>\n          <\u002Fspan>\n        <\u002Flabel>\n      <\u002Fform>\n    <\u002Fsection>\n\n    <!-- ────────────────────────────────────────────\n         05 — COMMON QUESTIONS\n         ──────────────────────────────────────────── -->\n    <section class=\"section\" id=\"section-faq\" data-screen-label=\"05 Common Questions\">\n      <header class=\"section__header\">\n        <span class=\"section__num\">05<\u002Fspan>\n        <div class=\"section__head-text\">\n          <h2 class=\"section__title\">Common Questions<\u002Fh2>\n          <p class=\"section__kicker\">The ones we get asked the most.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fheader>\n\n      <div class=\"faq\">\n        <details class=\"faq__item\">\n          <summary>\n            <span>Can I take Vamuz II to K'gari (Fraser Island)?<\u002Fspan>\n            <span class=\"faq__chev\" aria-hidden=\"true\">+<\u002Fspan>\n          <\u002Fsummary>\n          <div class=\"faq__body\">\n            Yes — K'gari is one of the best destinations for Vamuz II. The\n            Cannon XSR handles 75 Mile Beach and the inland tracks extremely\n            well. You'll need a vehicle access permit from the QLD Parks\n            website before you arrive. The barge from Inskip Point is the most\n            economical crossing (~15 min). Select <strong>4H + Sand mode<\u002Fstrong>\n            before hitting the sand, deflate to 16–20 PSI, and drive at low tide.\n          <\u002Fdiv>\n        <\u002Fdetails>\n\n        <details class=\"faq__item\">\n          <summary>\n            <span>What if I get bogged on the beach?<\u002Fspan>\n            <span class=\"faq__chev\" aria-hidden=\"true\">+<\u002Fspan>\n          <\u002Fsummary>\n          <div class=\"faq__body\">\n            Recovery gear is on board — recovery boards and a tow strap. First,\n            don't spin the wheels. Dig out around the tyres if needed, place\n            the boards in front of the drive wheels, and ease forward. If that\n            doesn't work, call us — we can guide you remotely. If you need a\n            tow, that cost is on you. This is exactly why we ask you to watch\n            the beach driving video first.\n          <\u002Fdiv>\n        <\u002Fdetails>\n\n        <details class=\"faq__item\">\n          <summary>\n            <span>What's covered and what's not under MyWay Protect?<\u002Fspan>\n            <span class=\"faq__chev\" aria-hidden=\"true\">+<\u002Fspan>\n          <\u002Fsummary>\n          <div class=\"faq__body\">\n            As a Premium member, off-road cover applies to gazetted unsealed\n            roads and campsite access tracks under 20 km in good condition.\n            It does <strong>not<\u002Fstrong> cover beach damage, tidal damage, sea\n            movement damage, suspension/drivetrain damage, tyre punctures, or\n            damage caused by reckless use. Beach driving liability is yours\n            personally. Check the full PDS at mywaygroup.co for details.\n          <\u002Fdiv>\n        <\u002Fdetails>\n\n        <details class=\"faq__item\">\n          <summary>\n            <span>Do I need experience in 4WD driving?<\u002Fspan>\n            <span class=\"faq__chev\" aria-hidden=\"true\">+<\u002Fspan>\n          <\u002Fsummary>\n          <div class=\"faq__body\">\n            You don't need to be an expert but you do need to be comfortable\n            with the basics — understanding 4WD transfer modes, terrain mode\n            selection, tyre pressure management, and knowing your limits. The\n            XSR's Sand mode makes beach driving more forgiving but it doesn't\n            replace technique. If this is your first time on the beach, watch\n            the video, go slow, and don't attempt anything you're not confident\n            about. We'd rather you have a good trip than a drama.\n          <\u002Fdiv>\n        <\u002Fdetails>\n\n        <details class=\"faq__item\">\n          <summary>\n            <span>What if something goes wrong out there?<\u002Fspan>\n            <span class=\"faq__chev\" aria-hidden=\"true\">+<\u002Fspan>\n          <\u002Fsummary>\n          <div class=\"faq__body\">\n            Message or call us — we respond fast. WhatsApp is quickest:\n            <a class=\"inline-link\" href=\"https://wa.me/61448103539\" target=\"_blank\" rel=\"noopener\">0448 103 539<\u002Fa>.\n            For serious mechanical issues, roadside assistance is included\n            through Camplify. For accidents or damage, report it through the\n            Camplify app and let us know directly. Don't try to fix damage\n            yourself without telling us first.\n          <\u002Fdiv>\n        <\u002Fdetails>\n\n        <details class=\"faq__item\">\n          <summary>\n            <span>Can I do Teewah Beach or Double Island Point?<\u002Fspan>\n            <span class=\"faq__chev\" aria-hidden=\"true\">+<\u002Fspan>\n          <\u002Fsummary>\n          <div class=\"faq__body\">\n            Yes — both are well within Vamuz II's capability. Access Teewah\n            Beach via the Tewantin Ferry. Double Island Point is accessible\n            via Rainbow Beach. Both require careful tidal awareness and proper\n            tyre deflation. Teewah is a more remote experience — take plenty\n            of water, food, and plan your fuel stop.\n          <\u002Fdiv>\n        <\u002Fdetails>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ────────────────────────────────────────────\n         06 — YOUR DETAILS + QUESTIONS (form submit)\n         ──────────────────────────────────────────── -->\n    <section class=\"section\" id=\"section-form\" data-screen-label=\"06 Your Details\">\n      <header class=\"section__header\">\n        <span class=\"section__num\">06<\u002Fspan>\n        <div class=\"section__head-text\">\n          <h2 class=\"section__title\">Your Details &amp; Questions<\u002Fh2>\n          <p class=\"section__kicker\">So we can match this briefing to your booking.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fheader>\n\n      <form class=\"form\" id=\"briefingForm\" autocomplete=\"on\" novalidate=\"\">\n        <!-- Web3Forms hidden fields -->\n        <input type=\"hidden\" name=\"access_key\" value=\"0fc4b583-a4d9-467d-be75-5a4a7dd57e56\">\n        <input type=\"hidden\" name=\"subject\" value=\"Vamuz II — Off-Road Briefing submission\">\n        <input type=\"hidden\" name=\"from_name\" value=\"Vamuz II Off-Road Briefing\">\n        <input type=\"hidden\" name=\"redirect\" value=\"false\">\n        <input type=\"checkbox\" name=\"botcheck\" class=\"sr-only\" tabindex=\"-1\" autocomplete=\"off\">\n        <!-- Will be populated on submit -->\n        <input type=\"hidden\" name=\"_checklist_summary\" id=\"checklistSummaryField\" value=\"\">\n\n        <div class=\"form__row\">\n          <label class=\"field\">\n            <span class=\"field__label\">Your name <em>*<\u002Fem><\u002Fspan>\n            <input type=\"text\" name=\"name\" id=\"fName\" required=\"\" placeholder=\"e.g. Sam Driver\" autocomplete=\"name\">\n          <\u002Flabel>\n          <label class=\"field\">\n            <span class=\"field__label\">Email <em>*<\u002Fem><\u002Fspan>\n            <input type=\"email\" name=\"email\" id=\"fEmail\" required=\"\" placeholder=\"you@example.com\" autocomplete=\"email\">\n          <\u002Flabel>\n        <\u002Fdiv>\n\n        <div class=\"form__row\">\n          <label class=\"field\">\n            <span class=\"field__label\">Phone / WhatsApp <em>*<\u002Fem><\u002Fspan>\n            <input type=\"tel\" name=\"phone\" id=\"fPhone\" required=\"\" placeholder=\"04XX XXX XXX\" autocomplete=\"tel\">\n          <\u002Flabel>\n          <label class=\"field\">\n            <span class=\"field__label\">Hire dates<\u002Fspan>\n            <input type=\"text\" name=\"hire_dates\" id=\"fDates\" placeholder=\"e.g. 22–29 Nov\">\n          <\u002Flabel>\n        <\u002Fdiv>\n\n        <fieldset class=\"field field--radio\">\n          <legend class=\"field__label\">4WD experience level<\u002Flegend>\n          <div class=\"radio-row\">\n            <label class=\"radio\">\n              <input type=\"radio\" name=\"experience\" value=\"none\">\n              <span>None — first time off-road<\u002Fspan>\n            <\u002Flabel>\n            <label class=\"radio\">\n              <input type=\"radio\" name=\"experience\" value=\"some\">\n              <span>Some — beach / dirt before<\u002Fspan>\n            <\u002Flabel>\n            <label class=\"radio\">\n              <input type=\"radio\" name=\"experience\" value=\"experienced\">\n              <span>Experienced — multi-day 4WD<\u002Fspan>\n            <\u002Flabel>\n          <\u002Fdiv>\n        <\u002Ffieldset>\n\n        <label class=\"field\">\n          <span class=\"field__label\">Planned off-road destinations<\u002Fspan>\n          <textarea name=\"destinations\" id=\"fDest\" rows=\"3\" placeholder=\"e.g. K'gari for 2 nights, Teewah Beach day trip, Inskip Point campground…\"><\u002Ftextarea>\n        <\u002Flabel>\n\n        <label class=\"field\">\n          <span class=\"field__label\">Questions or anything you're unsure about<\u002Fspan>\n          <textarea name=\"questions\" id=\"fQs\" rows=\"4\" placeholder=\"No dumb questions. Tyre pressure? Recovery? Specific track? Ask away.\"><\u002Ftextarea>\n        <\u002Flabel>\n      <\u002Fform>\n    <\u002Fsection>\n\n    <!-- ────────────────────────────────────────────\n         07 — ACKNOWLEDGEMENT + SUBMIT\n         ──────────────────────────────────────────── -->\n    <section class=\"section section--ack\" id=\"section-ack\" data-screen-label=\"07 Acknowledgement\">\n      <header class=\"section__header\">\n        <span class=\"section__num\">07<\u002Fspan>\n        <div class=\"section__head-text\">\n          <h2 class=\"section__title\">Acknowledgement<\u002Fh2>\n          <p class=\"section__kicker\">The signature on the briefing.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fheader>\n\n      <label class=\"check check--ack\" data-check=\"ack\">\n        <input type=\"checkbox\" name=\"check_ack\">\n        <span class=\"check__box\" aria-hidden=\"true\"><\u002Fspan>\n        <span class=\"check__body\">\n          <span class=\"check__title\">I confirm that I have read and understood this briefing.<\u002Fspan>\n          <span class=\"check__desc\">\n            I've watched the beach driving video. I understand beach driving is\n            not covered by MyWay Protect and that I am personally liable for\n            any damage on sand or near tidal areas. I understand the off-road\n            rules, the vehicle's capabilities and limitations, and my\n            responsibilities as a hirer of Vamuz II. I agree to drive\n            responsibly and within the conditions and guidelines above.\n          <\u002Fspan>\n        <\u002Fspan>\n      <\u002Flabel>\n\n      <div class=\"submit-block\">\n        <button type=\"button\" class=\"submit-btn\" id=\"submitBtn\" disabled=\"\" aria-disabled=\"true\">\n          <span class=\"submit-btn__label\">Submit Briefing<\u002Fspan>\n          <span class=\"submit-btn__arrow\" aria-hidden=\"true\">→<\u002Fspan>\n        <\u002Fbutton>\n        <p class=\"submit-block__hint\" id=\"submitHint\">\n          Complete every check above and fill in your details to enable submit.\n        <\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n  <\u002Fmain>\n\n  <footer class=\"footer\">\n    <div class=\"footer__inner\">\n      <div class=\"footer__brand\">vamuz<\u002Fdiv>\n      <div class=\"footer__meta\">\n        <span>Sunshine Coast, QLD<\u002Fspan>\n        <span><a href=\"tel:+61448103539\">(+61) 0448 103 539<\u002Fa><\u002Fspan>\n        <span><a href=\"https://wa.me/61448103539\" target=\"_blank\" rel=\"noopener\">WhatsApp Chris<\u002Fa><\u002Fspan>\n        <span><a href=\"mailto:hello@vamuz.au\">hello@vamuz.au<\u002Fa><\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"footer__legal\">© Vamuz · This briefing is required reading for Vamuz II off-road hires.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n  <!-- ────────────────────────────────────────────\n       THA
