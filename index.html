  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  font-weight: 500;\n  font-display: swap;\n  src: url(\"6b64d21d-4527-4612-8b2a-91a468e3aa3b\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"bd7b8d7f-7183-4548-bcb3-81498aad6801\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n/* ─────────────────────────────────────────────\n   BASE COLOR PALETTE\n   ───────────────────────────────────────────── */\n:root {\n  /* Brand core */\n  --ink:          #2B2B28;   /* Near-black with warm undertone; logo color */\n  --ink-light:    #4A4A45;   /* Secondary text on light bg */\n  --rust:         #C0622A;   /* Terracotta/rust — primary accent */\n  --rust-light:   #D97A45;   /* Lighter rust for hover */\n  --rust-dark:    #A3501F;   /* Darker rust for press */\n  --ochre:        #D4933A;   /* Warm amber — secondary accent */\n  --ochre-light:  #E4AA55;\n  --ochre-dark:   #B87A28;\n\n  /* Neutral / Surface */\n  --canvas:       #F5F0E8;   /* Warm off-white background */\n  --surface:      #FFFFFF;   /* Card / modal surface */\n  --surface-alt:  #FAFAF7;   /* Alternating row / secondary surface */\n  --stone:        #8B8578;   /* Warm mid-grey; secondary text */\n  --stone-light:  #B8B0A5;   /* Placeholder text, disabled */\n  --border:       #E8E2D8;   /* Dividers, input borders */\n  --border-dark:  #D4CEC4;   /* Stronger dividers */\n\n  /* Semantic */\n  --sage:         #5A7A5A;   /* Success / active / packaged */\n  --sage-bg:      #EEF4EE;   /* Success background tint */\n  --amber:        #C4872A;   /* Warning / needs review */\n  --amber-bg:     #FDF4E3;   /* Warning background tint */\n  --clay:         #B54A2F;   /* Error / destructive */\n  --clay-bg:      #FCEDED;   /* Error background tint */\n  --info:         #3A6B8A;   /* Info / link */\n  --info-bg:      #EBF3F8;   /* Info background tint */\n\n  /* Trip status colors */\n  --status-planned:    #3A6B8A;\n  --status-active:     #5A7A5A;\n  --status-completed:  #8B8578;\n  --status-packaged:   #2B2B28;\n\n  /* Brand electric pink — primary CTA on website (\"Book Now\", \"Plan My Trip\" nav) */\n  --pink:         #FE019D;   /* Fluro hot pink; high-energy primary action color */\n  --pink-dark:    #D4007F;   /* Darker pink for hover/press */\n  --pink-light:   #FF4DB8;   /* Lighter tint for subtle uses */\n  --pink-bg:      #FFF0F9;   /* Very light pink tint background */\n\n  /* Dark surface (for header / nav) */\n  --dark-bg:      #2B2B28;\n  --dark-surface: #353530;\n  --dark-border:  #4A4A45;\n  --dark-text:    #F5F0E8;\n  --dark-muted:   #8B8578;\n}\n\n/* ─────────────────────────────────────────────\n   TYPOGRAPHY SCALE\n   ───────────────────────────────────────────── */\n:root {\n  /* Font families */\n  --font-display: 'Barlow', system-ui, sans-serif;  /* Wordmark / hero headlines */\n  --font-body:    'Barlow', system-ui, sans-serif;  /* All UI text */\n  --font-mono:    'JetBrains Mono', 'Fira Mono', monospace; /* Amounts, dates, codes */\n\n  /* Font weights */\n  --weight-regular:   400;\n  --weight-medium:    500;\n  --weight-semibold:  600;\n  --weight-bold:      700;\n  --weight-black:     900;\n\n  /* Type scale (mobile-first; use clamp for responsive) */\n  --text-xs:    11px;\n  --text-sm:    13px;\n  --text-base:  15px;\n  --text-md:    17px;\n  --text-lg:    20px;\n  --text-xl:    24px;\n  --text-2xl:   32px;\n  --text-3xl:   40px;\n  --text-4xl:   52px;\n  --text-5xl:   72px;\n\n  /* Line heights */\n  --leading-tight:  1.2;\n  --leading-snug:   1.35;\n  --leading-normal: 1.5;\n  --leading-loose:  1.7;\n\n  /* Letter spacing */\n  --tracking-tight:  -0.02em;\n  --tracking-normal:  0em;\n  --tracking-wide:    0.04em;\n  --tracking-wider:   0.08em;\n  --tracking-widest:  0.12em;\n}\n\n/* ─────────────────────────────────────────────\n   SEMANTIC TYPOGRAPHY ROLES\n   ───────────────────────────────────────────── */\n:root {\n  /* Display / hero */\n  --type-hero-size:    var(--text-5xl);\n  --type-hero-weight:  var(--weight-black);\n  --type-hero-leading: var(--leading-tight);\n  --type-hero-tracking: var(--tracking-tight);\n\n  /* Section headings */\n  --type-h1-size:    var(--text-3xl);\n  --type-h1-weight:  var(--weight-black);\n  --type-h1-leading: var(--leading-tight);\n\n  --type-h2-size:    var(--text-2xl);\n  --type-h2-weight:  var(--weight-bold);\n  --type-h2-leading: var(--leading-snug);\n\n  --type-h3-size:    var(--text-xl);\n  --type-h3-weight:  var(--weight-semibold);\n  --type-h3-leading: var(--leading-snug);\n\n  --type-h4-size:    var(--text-lg);\n  --type-h4-weight:  var(--weight-semibold);\n  --type-h4-leading: var(--leading-normal);\n\n  /* Body */\n  --type-body-size:    var(--text-base);\n  --type-body-weight:  var(--weight-regular);\n  --type-body-leading: var(--leading-normal);\n\n  --type-body-sm-size:    var(--text-sm);\n  --type-body-sm-weight:  var(--weight-regular);\n  --type-body-sm-leading: var(--leading-normal);\n\n  /* Labels / UI chrome */\n  --type-label-size:    var(--text-sm);\n  --type-label-weight:  var(--weight-medium);\n  --type-label-leading: var(--leading-tight);\n\n  --type-caption-size:    var(--text-xs);\n  --type-caption-weight:  var(--weight-regular);\n  --type-caption-leading: var(--leading-normal);\n\n  /* Mono / financial data */\n  --type-mono-size:    var(--text-base);\n  --type-mono-weight:  var(--weight-regular);\n\n  --type-amount-size:    var(--text-lg);\n  --type-amount-weight:  var(--weight-medium);\n}\n\n/* ─────────────────────────────────────────────\n   SPACING SCALE\n   ───────────────────────────────────────────── */\n:root {\n  --space-1:   4px;\n  --space-2:   8px;\n  --space-3:   12px;\n  --space-4:   16px;\n  --space-5:   20px;\n  --space-6:   24px;\n  --space-8:   32px;\n  --space-10:  40px;\n  --space-12:  48px;\n  --space-16:  64px;\n  --space-20:  80px;\n  --space-24:  96px;\n}\n\n/* ─────────────────────────────────────────────\n   BORDER RADIUS\n   ───────────────────────────────────────────── */\n:root {\n  --radius-sm:   4px;   /* Tags, chips, small badges */\n  --radius-md:   8px;   /* Inputs, cards, buttons */\n  --radius-lg:   12px;  /* Larger cards, drawers */\n  --radius-xl:   16px;  /* Modals, bottom sheets */\n  --radius-full: 9999px; /* Pills, avatars, fab */\n}\n\n/* ─────────────────────────────────────────────\n   SHADOWS\n   ───────────────────────────────────────────── */\n:root {\n  --shadow-xs:  0 1px 2px rgba(43,43,40,0.06);\n  --shadow-sm:  0 1px 3px rgba(43,43,40,0.08), 0 1px 2px rgba(43,43,40,0.04);\n  --shadow-md:  0 4px 12px rgba(43,43,40,0.10), 0 2px 4px rgba(43,43,40,0.06);\n  --shadow-lg:  0 8px 24px rgba(43,43,40,0.12), 0 4px 8px rgba(43,43,40,0.06);\n  --shadow-xl:  0 20px 60px rgba(43,43,40,0.18), 0 8px 16px rgba(43,43,40,0.08);\n\n  /* Colored shadows for accent elements */\n  --shadow-rust: 0 4px 16px rgba(192,98,42,0.30);\n  --shadow-fab:  0 6px 20px rgba(43,43,40,0.25), 0 2px 6px rgba(43,43,40,0.12);\n}\n\n/* ─────────────────────────────────────────────\n   TRANSITIONS\n   ───────────────────────────────────────────── */\n:root {\n  --transition-fast:   150ms ease-out;\n  --transition-base:   200ms ease-out;\n  --transition-slow:   300ms ease-out;\n}\n\n/* ─────────────────────────────────────────────\n   Z-INDEX SCALE\n   ───────────────────────────────────────────── */\n:root {\n  --z-base:     0;\n  --z-raised:   10;\n  --z-dropdown: 100;\n  --z-sticky:   200;\n  --z-fixed:    300;\n  --z-modal:    400;\n  --z-toast:    500;\n}\n\n/* ─────────────────────────────────────────────\n   UTILITY CLASSES\n   ───────────────────────────────────────────── */\n\n/* Base reset helpers */\n*, *::before, *::after { box-sizing: border-box; }\n\nbody {\n  font-family: var(--font-body);\n  font-size: var(--text-base);\n  line-height: var(--leading-normal);\n  color: var(--ink);\n  background: var(--canvas);\n  -webkit-font-smoothing: antialiased;\n  text-wrap: pretty;\n}\n\n/* Semantic heading classes */\n.h1 {\n  font-size: var(--type-h1-size);\n  font-weight: var(--type-h1-weight);\n  line-height: var(--type-h1-leading);\n  letter-spacing: var(--tracking-tight);\n}\n.h2 {\n  font-size: var(--type-h2-size);\n  font-weight: var(--type-h2-weight);\n  line-height: var(--type-h2-leading);\n  letter-spacing: var(--tracking-tight);\n}\n.h3 {\n  font-size: var(--type-h3-size);\n  font-weight: var(--type-h3-weight);\n  line-height: var(--type-h3-leading);\n}\n.h4 {\n  font-size: var(--type-h4-size);\n  font-weight: var(--type-h4-weight);\n  line-height: var(--type-h4-leading);\n}\n\n.body-sm  { font-size: var(--text-sm); }\n.label    { font-size: var(--text-sm); font-weight: var(--weight-medium); }\n.caption  { font-size: var(--text-xs); color: var(--stone); }\n.mono     { font-family: var(--font-mono); }\n.amount   { font-family: var(--font-mono); font-weight: var(--weight-medium); }\n\n/* Color utilities */\n.text-ink       { color: var(--ink); }\n.text-muted     { color: var(--stone); }\n.text-rust      { color: var(--rust); }\n.text-sage      { color: var(--sage); }\n.text-amber     { color: var(--amber); }\n.text-clay      { color: var(--clay); }\n.bg-canvas      { background: var(--canvas); }\n.bg-surface     { background: var(--surface); }\n.bg-ink         { background: var(--ink); color: var(--dark-text); }\n.bg-rust        { background: var(--rust); color: #fff; }\n<\u002Fstyle>\n  <style>/* ─────────────────────────────────────────────\n   VAMUZ II — OFF-ROAD BRIEFING\n   Dark on-ink theme · pink CTA · field-manual feel\n   ───────────────────────────────────────────── */\n\n*, *::before, *::after { box-sizing: border-box; }\n\nhtml {\n  -webkit-text-size-adjust: 100%;\n  scroll-behavior: smooth;\n}\n\nbody {\n  margin: 0;\n  font-family: var(--font-body);\n  background: var(--ink);\n  color: var(--dark-text);\n  font-size: var(--text-base);\n  line-height: var(--leading-normal);\n  font-weight: var(--weight-regular);\n  -webkit-font-smoothing: antialiased;\n  -moz-osx-font-smoothing: grayscale;\n  text-rendering: optimizeLegibility;\n}\n\nimg { max-width: 100%; display: block; }\na { color: inherit; }\n\n.sr-only {\n  position: absolute !important;\n  width: 1px; height: 1px;\n  padding: 0; margin: -1px;\n  overflow: hidden; clip: rect(0,0,0,0);\n  white-space: nowrap; border: 0;\n}\n\n/* ─────────────────────────────────────────────\n   TOP BAR\n   ───────────────────────────────────────────── */\n.topbar {\n  position: sticky;\n  top: 0;\n  z-index: var(--z-sticky, 30);\n  display: grid;\n  grid-template-columns: auto 1fr auto;\n  align-items: center;\n  gap: 16px;\n  padding: 12px 20px;\n  background: rgba(20, 20, 18, 0.82);\n  backdrop-filter: blur(14px) saturate(140%);\n  -webkit-backdrop-filter: blur(14px) saturate(140%);\n  border-bottom: 1px solid rgba(255,255,255,0.06);\n}\n\n.topbar__brand img {\n  height: 28px;\n  width: auto;\n  display: block;\n  filter: drop-shadow(0 1px 1px rgba(0,0,0,.3));\n}\n\n.topbar__progress {\n  display: flex;\n  align-items: center;\n  gap: 12px;\n  min-width: 0;\n}\n\n.topbar__progress-track {\n  flex: 1;\n  height: 3px;\n  background: rgba(255,255,255,0.08);\n  border-radius: 999px;\n  overflow: hidden;\n  position: relative;\n}\n\n.topbar__progress-fill {\n  position: absolute;\n  inset: 0 100% 0 0;\n  background: linear-gradient(90deg, var(--rust) 0%, var(--ochre) 60%, var(--pink) 100%);\n  border-radius: 999px;\n  transition: right .35s cubic-bezier(.2,.7,.2,1);\n}\n\n.topbar__progress-label {\n  font-family: var(--font-mono);\n  font-size: 11px;\n  letter-spacing: .04em;\n  color: var(--dark-text);\n  white-space: nowrap;\n  display: flex;\n  align-items: baseline;\n  gap: 4px;\n}\n\n.topbar__progress-caption {\n  font-size: 10px;\n  color: var(--stone);\n  text-transform: uppercase;\n  letter-spacing: .08em;\n  margin-left: 4px;\n}\n\n.topbar__cta {\n  appearance: none;\n  border: 0;\n  background: var(--pink);\n  color: #fff;\n  font-family: var(--font-display);\n  font-weight: var(--weight-semibold);\n  font-size: 11px;\n  letter-spacing: .12em;\n  text-transform: uppercase;\n  padding: 10px 16px;\n  border-radius: 4px;\n  cursor: pointer;\n  transition: background .15s ease, transform .15s ease, opacity .2s ease;\n}\n.topbar__cta:hover:not(:disabled) { background: var(--pink-dark); }\n.topbar__cta:active:not(:disabled) { transform: scale(.97); }\n.topbar__cta:disabled {\n  background: rgba(255,255,255,0.06);\n  color: var(--stone);\n  cursor: not-allowed;\n}\n\n/* hide progress label text on very narrow screens */\n@media (max-width: 540px) {\n  .topbar { padding: 10px 14px; gap: 10px; }\n  .topbar__brand img { height: 22px; }\n  .topbar__progress-caption { display: none; }\n  .topbar__cta { padding: 9px 12px; font-size: 10px; }\n}\n\n/* ─────────────────────────────────────────────\n   HERO\n   ───────────────────────────────────────────── */\n.hero {\n  position: relative;\n  padding: 56px 20px 48px;\n  overflow: hidden;\n  background:\n    radial-gradient(1200px 600px at 80% -100px, rgba(192,98,42,.18), transparent 60%),\n    radial-gradient(900px 500px at 0% 30%, rgba(254,1,157,.06), transparent 60%),\n    var(--ink);\n}\n\n.hero::before {\n  /* faint topographic contour pattern */\n  content: \"\";\n  position: absolute;\n  inset: 0;\n  background-image:\n    repeating-linear-gradient(0deg, transparent 0 47px, rgba(255,255,255,.02) 47px 48px),\n    repeating-linear-gradient(90deg, transparent 0 47px, rgba(255,255,255,.02) 47px 48px);\n  pointer-events: none;\n  mask-image: radial-gradient(ellipse at center, #000 30%, transparent 75%);\n}\n\n.hero__grid {\n  position: relative;\n  max-width: 1180px;\n  margin: 0 auto;\n  display: grid;\n  grid-template-columns: minmax(0, 1.05fr) minmax(0, 1fr);\n  gap: 48px;\n  align-items: center;\n}\n@media (max-width: 880px) {\n  .hero__grid { grid-template-columns: 1fr; gap: 28px; }\n}\n\n.hero__copy { min-width: 0; }\n\n.hero__eyebrow {\n  font-family: var(--font-mono);\n  font-size: 11px;\n  letter-spacing: .12em;\n  text-transform: uppercase;\n  color: var(--ochre-light);\n  display: inline-flex;\n  align-items: center;\n  gap: 10px;\n  padding: 6px 12px 6px 10px;\n  border: 1px solid rgba(212,147,58,.4);\n  border-radius: 999px;\n  background: rgba(212,147,58,.06);\n}\n.hero__eyebrow .dot {\n  width: 6px; height: 6px; border-radius: 999px;\n  background: var(--pink);\n  box-shadow: 0 0 12px var(--pink);\n  animation: pulse 1.8s ease-in-out infinite;\n}\n@keyframes pulse {\n  0%,100% { opacity: 1; transform: scale(1); }\n  50%     { opacity: .5; transform: scale(.85); }\n}\n\n.hero__title {\n  margin: 24px 0 24px;\n  font-family: var(--font-display);\n  font-weight: var(--weight-bold);\n  font-size: clamp(52px, 8vw, 108px);\n  line-height: .95;\n  letter-spacing: -0.02em;\n  text-transform: uppercase;\n  color: var(--dark-text);\n  display: flex;\n  flex-direction: column;\n  gap: 2px;\n}\n.hero__title-accent {\n  color: var(--pink);\n  font-style: normal;\n  font-weight: var(--weight-bold);\n  letter-spacing: -0.025em;\n  /* slight overhang */\n  margin-left: -.02em;\n}\n\n.hero__lede {\n  max-width: 580px;\n  font-size: clamp(16px, 1.6vw, 19px);\n  line-height: var(--leading-normal);\n  color: var(--stone-light);\n  margin: 0 0 32px;\n}\n\n.hero__meta {\n  list-style: none;\n  margin: 0;\n  padding: 16px 0;\n  display: flex;\n  flex-wrap: wrap;\n  gap: 0;\n  border-top: 1px solid rgba(255,255,255,.08);\n  border-bottom: 1px solid rgba(255,255,255,.08);\n}\n.hero__meta li {\n  display: flex;\n  flex-direction: column;\n  gap: 2px;\n  padding: 6px 24px 6px 0;\n  margin-right: 24px;\n  border-right: 1px solid rgba(255,255,255,.08);\n}\n.hero__meta li:last-child { border-right: 0; margin-right: 0; padding-right: 0; }\n.hero__meta-key {\n  font-family: var(--font-mono);\n  font-size: 10px;\n  text-transform: uppercase;\n  letter-spacing: .12em;\n  color: var(--stone);\n}\n.hero__meta-val {\n  font-family: var(--font-display);\n  font-weight: var(--weight-bold);\n  font-size: 15px;\n  color: var(--dark-text);\n  letter-spacing: .01em;\n}\n.hero__meta-val--accent { color: var(--ochre-light); }\n.hero__meta-val--accent.is-complete { color: var(--sage); }\n\n/* hero photo */\n.hero__photo {\n  margin: 0;\n  max-width: 100%;\n}\n.hero__photo-frame {\n  position: relative;\n  aspect-ratio: 9/10;\n  background:\n    linear-gradient(135deg, #1a1a18 0%, #25241f 50%, #1a1a18 100%);\n  border: 1px solid rgba(255,255,255,.08);\n  border-radius: 8px;\n  overflow: hidden;\n  color: var(--stone);\n  box-shadow: 0 24px 80px rgba(0,0,0,.4), 0 4px 12px rgba(0,0,0,.2);\n}\n.hero__photo-frame img {\n  position: absolute;\n  inset: 0;\n  width: 100%;\n  height: 100%;\n  object-fit: cover;\n  object-position: center 35%;\n  z-index: 0;\n}\n@media (max-width: 880px) {\n  .hero__photo-frame { aspect-ratio: 16/11; }\n  .hero__photo-frame img { object-position: center 40%; }\n}\n.hero__photo-corner {\n  position: absolute;\n  width: 22px; height: 22px;\n  border: 2px solid var(--ochre);\n  z-index: 2;\n  mix-blend-mode: screen;\n  opacity: .85;\n}\n.hero__photo-corner--tl { top: 10px; left: 10px; border-right: 0; border-bottom: 0; }\n.hero__photo-corner--tr { top: 10px; right: 10px; border-left: 0; border-bottom: 0; }\n.hero__photo-corner--bl { bottom: 10px; left: 10px; border-right: 0; border-top: 0; }\n.hero__photo-corner--br { bottom: 10px; right: 10px; border-left: 0; border-top: 0; }\n\n.hero__photo-stamp {\n  position: absolute;\n  bottom: 18px; left: 22px;\n  text-align: left;\n  font-family: var(--font-mono);\n  letter-spacing: .12em;\n  text-transform: uppercase;\n  z-index: 2;\n  padding: 10px 12px;\n  border-left: 2px solid var(--pink);\n  background: linear-gradient(90deg, rgba(20,20,18,.7), rgba(20,20,18,0));\n  backdrop-filter: blur(4px);\n  -webkit-backdrop-filter: blur(4px);\n}\n.hero__photo-stamp-label {\n  display: block;\n  font-size: 11px;\n  color: var(--pink);\n  font-weight: var(--weight-medium);\n}\n.hero__photo-stamp-sub {\n  display: block;\n  font-size: 10px;\n  color: var(--dark-text);\n  margin-top: 3px;\n  opacity: .75;\n}\n\n/* subtle vignette so corners + stamp pop */\n.hero__photo-frame::after {\n  content: \"\";\n  position: absolute;\n  inset: 0;\n  background:\n    linear-gradient(180deg, rgba(0,0,0,0) 50%, rgba(0,0,0,.45) 100%),\n    linear-gradient(90deg, rgba(0,0,0,.18) 0%, rgba(0,0,0,0) 35%);\n  z-index: 1;\n  pointer-events: none;\n}\n\n@media (max-width: 600px) {\n  .hero { padding: 36px 16px 28px; }\n  .hero__title { font-size: clamp(44px, 13vw, 84px); }\n  .hero__meta li { padding-right: 14px; margin-right: 14px; }\n  .hero__photo-frame { aspect-ratio: 4/3; }\n}\n\n/* ─────────────────────────────────────────────\n   LAYOUT — CONTAINER\n   ───────────────────────────────────────────── */\n.container {\n  max-width: 960px;\n  margin: 0 auto;\n  padding: 0 20px 80px;\n}\n\n/* ─────────────────────────────────────────────\n   SECTION HEADER\n   ───────────────────────────────────────────── */\n.section {\n  margin-top: 80px;\n  scroll-margin-top: 80px;\n}\n.section:first-child { margin-top: 64px; }\n\n.section__header {\n  display: flex;\n  align-items: flex-start;\n  gap: 20px;\n  margin-bottom: 28px;\n  padding-bottom: 20px;\n  border-bottom: 1px solid rgba(255,255,255,.08);\n}\n.section__num {\n  font-family: var(--font-mono);\n  font-size: 13px;\n  font-weight: var(--weight-medium);\n  letter-spacing: .12em;\n  color: var(--pink);\n  padding: 4px 10px;\n  border: 1px solid rgba(254,1,157,.35);\n  border-radius: 4px;\n  background: rgba(254,1,157,.08);\n  flex-shrink: 0;\n  margin-top: 4px;\n}\n.section__head-text { flex: 1; min-width: 0; }\n.section__expand {\n  appearance: none;\n  border: 1px solid rgba(255,255,255,.12);\n  background: transparent;\n  color: var(--stone-light);\n  font-family: var(--font-mono);\n  font-size: 11px;\n  letter-spacing: .12em;\n  text-transform: uppercase;\n  padding: 8px 14px;\n  border-radius: 4px;\n  cursor: pointer;\n  white-space: nowrap;\n  align-self: center;\n  transition: color .15s ease, border-color .15s ease, background .15s ease;\n}\n.section__expand:hover {\n  color: var(--ochre-light);\n  border-color: rgba(212,147,58,.4);\n  background: rgba(212,147,58,.06);\n}\n@media (max-width: 540px) {\n  .section__header { flex-wrap: wrap; }\n  .section__expand { order: 3; margin-left: auto; padding: 6px 10px; font-size: 10px; }\n}\n.section__title {\n  font-family: var(--font-display);\n  font-weight: var(--weight-semibold);\n  font-size: clamp(30px, 4vw, 42px);\n  line-height: 1.05;\n  letter-spacing: -0.015em;\n  margin: 0 0 6px;\n  text-transform: uppercase;\n  color: var(--dark-text);\n}\n.section__kicker {\n  font-family: var(--font-mono);\n  font-size: 12px;\n  color: var(--stone);\n  letter-spacing: .04em;\n  margin: 0;\n}\n\n.section__intro {\n  font-size: 17px;\n  line-height: var(--leading-normal);\n  color: #d9d4c8;\n  max-width: 720px;\n  margin: 0 0 28px;\n}\n.section__intro strong { color: var(--dark-text); }\n\n/* ─────────────────────────────────────────────\n   CARD ACCORDIONS — Know the Vehicle (Section 01)\n   ───────────────────────────────────────────── */\n.card-grid {\n  display: grid;\n  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));\n  gap: 12px;\n}\n\n.card-acc {\n  background: var(--dark-surface);\n  border: 1px solid rgba(255,255,255,.06);\n  border-radius: 10px;\n  overflow: hidden;\n  transition: border-color .15s ease, transform .15s ease, background .15s ease;\n}\n.card-acc:hover { border-color: rgba(212,147,58,.35); }\n.card-acc[open] {\n  border-color: rgba(212,147,58,.5);\n  background: linear-gradient(180deg, rgba(212,147,58,.06), var(--dark-surface) 60%);\n}\n\n.card-acc > summary {\n  list-style: none;\n  display: grid;\n  grid-template-columns: auto 1fr auto;\n  gap: 14px;\n  align-items: center;\n  padding: 16px 18px;\n  cursor: pointer;\n  user-select: none;\n}\n.card-acc > summary::-webkit-details-marker { display: none; }\n\n.card-acc__icon {\n  font-size: 26px;\n  line-height: 1;\n  flex-shrink: 0;\n  filter: saturate(110%);\n  /* small bg plate so emoji feels like an icon stamp */\n  width: 44px;\n  height: 44px;\n  border-radius: 8px;\n  background: rgba(212,147,58,.08);\n  border: 1px solid rgba(212,147,58,.15);\n  display: inline-flex;\n  align-items: center;\n  justify-content: center;\n}\n.card-acc[open] .card-acc__icon {\n  background: rgba(212,147,58,.14);\n  border-color: rgba(212,147,58,.3);\n}\n.card-acc__head { min-width: 0; }\n.card-acc__title {\n  display: block;\n  font-family: var(--font-display);\n  font-weight: var(--weight-semibold);\n  font-size: 16px;\n  color: var(--dark-text);\n  letter-spacing: -.005em;\n  line-height: 1.2;\n}\n.card-acc__teaser {\n  display: block;\n  font-size: 13px;\n  color: var(--stone);\n  margin-top: 3px;\n  line-height: 1.35;\n}\n.card-acc__chev {\n  font-family: var(--font-mono);\n  font-size: 22px;\n  line-height: 1;\n  color: var(--ochre);\n  transition: transform .2s ease, color .2s ease;\n  flex-shrink: 0;\n}\n.card-acc[open] .card-acc__chev { transform: rotate(45deg); color: var(--pink); }\n\n.card-acc__body {\n  padding: 0 18px 18px 18px;\n  font-size: 14.5px;\n  color: #c7c2b6;\n  line-height: 1.55;\n  border-top: 1px solid rgba(255,255,255,.04);\n  margin-top: 4px;\n  padding-top: 14px;\n}\n.card-acc__body p { margin: 0 0 10px; }\n.card-acc__body p:last-child { margin-bottom: 0; }\n.card-acc__body strong { color: var(--dark-text); font-weight: var(--weight-semibold); }\n.card-acc__body em { color: var(--ochre-light); font-style: italic; font-weight: var(--weight-medium); }\n\n.card-acc__tip,\n.card-acc__warn {\n  margin-top: 10px !important;\n  padding: 10px 12px;\n  border-radius: 6px;\n  font-size: 13.5px;\n  line-height: 1.5;\n}\n.card-acc__tip {\n  background: rgba(58,107,138,.1);\n  border-left: 2px solid var(--info);\n  color: #b6cad8;\n}\n.card-acc__warn {\n  background: rgba(181,74,47,.1);\n  border-left: 2px solid var(--clay);\n  color: #e0b1a4;\n}\n\n/* ─────────────────────────────────────────────\n   RULE ACCORDIONS — Beach & Off-Road (02, 03)\n   ───────────────────────────────────────────── */\n.rules-heading {\n  font-family: var(--font-mono);\n  font-size: 11px;\n  text-transform: uppercase;\n  letter-spacing: .14em;\n  color: var(--stone);\n  margin: 28px 0 12px;\n  font-weight: var(--weight-medium);\n}\n\n.rule-acc {\n  display: flex;\n  flex-direction: column;\n  gap: 1px;\n  background: rgba(255,255,255,.06);\n  border-radius: 10px;\n  overflow: hidden;\n  border: 1px solid rgba(255,255,255,.06);\n}\n\n.rule-acc__item { background: var(--dark-surface); transition: background .15s ease; }\n.rule-acc__item[open] {\n  background: linear-gradient(180deg, rgba(212,147,58,.06), var(--dark-surface) 100%);\n}\n\n.rule-acc__item summary {\n  list-style: none;\n  display: grid;\n  grid-template-columns: auto 1fr auto;\n  gap: 14px;\n  align-items: center;\n  padding: 16px 22px;\n  cursor: pointer;\n  font-family: var(--font-display);\n  font-weight: var(--weight-semibold);\n  font-size: 15.5px;\n  color: var(--dark-text);\n  user-select: none;\n  letter-spacing: -.005em;\n}\n.rule-acc__item summary::-webkit-details-marker { display: none; }\n\n.rule-acc__icon {\n  font-size: 20px;\n  line-height: 1;\n  flex-shrink: 0;\n  width: 32px;\n  text-align: center;\n  filter: saturate(110%);\n}\n\n.rule-acc__title { min-width: 0; }\n\n.rule-acc__chev {\n  font-family: var(--font-mono);\n  font-size: 22px;\n  line-height: 1;\n  color: var(--ochre);\n  transition: transform .2s ease, color .2s ease;\n  flex-shrink: 0;\n}\n.rule-acc__item[open] .rule-acc__chev { transform: rotate(45deg); color: var(--pink); }\n\n.rule-acc__body {\n  padding: 0 22px 18px 68px;\n  font-size: 14.5px;\n  line-height: 1.6;\n  color: #c7c2b6;\n}\n.rule-acc__body em { color: var(--ochre-light); font-style: italic; }\n\n@media (max-width: 540px) {\n  .rule-acc__item summary { padding: 14px 16px; font-size: 14.5px; gap: 10px; }\n  .rule-acc__body { padding: 0 16px 16px 58px; }\n  .rule-acc__icon { font-size: 18px; width: 28px; }\n}\n\n/* ─────────────────────────────────────────────\n   INFO CARDS (legacy — kept for any one-off uses)\n   ───────────────────────────────────────────── */\n.info-grid {\n  display: grid;\n  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));\n  gap: 16px;\n}\n.info-card {\n  background: var(--dark-surface);\n  border: 1px solid rgba(255,255,255,.06);\n  border-radius: 8px;\n  padding: 22px 22px 22px;\n  position: relative;\n  transition: border-color .2s ease, transform .2s ease;\n}\n.info-card:hover {\n  border-color: rgba(212,147,58,.4);\n  transform: translateY(-1px);\n}\n.info-card__tag {\n  font-family: var(--font-mono);\n  font-size: 10px;\n  letter-spacing: .14em;\n  text-transform: uppercase;\n  color: var(--ochre);\n  padding: 3px 8px;\n  border-radius: 3px;\n  background: rgba(212,147,58,.1);\n  display: inline-block;\n  margin-bottom: 14px;\n}\n.info-card h3 {\n  margin: 0 0 10px;\n  font-family: var(--font-display);\n  font-weight: var(--weight-bold);\n  font-size: 19px;\n  letter-spacing: -0.01em;\n  color: var(--dark-text);\n  line-height: 1.2;\n}\n.info-card p {\n  margin: 0;\n  font-size: 14.5px;\n  color: #c7c2b6;\n  line-height: 1.55;\n}\n.info-card p strong { color: var(--dark-text); font-weight: var(--weight-semibold); }\n.info-card p em { color: var(--ochre-light); font-style: normal; font-weight: var(--weight-semibold); }\n\n/* ─────────────────────────────────────────────\n   CALLOUTS (warn / ok / info)\n   ───────────────────────────────────────────── */\n.callout {\n  margin: 24px 0;\n  padding: 22px 22px 20px;\n  border-radius: 8px;\n  background: var(--dark-surface);\n  border-left: 4px solid var(--rust);\n  border-top: 1px solid rgba(255,255,255,.04);\n  border-right: 1px solid rgba(255,255,255,.04);\n  border-bottom: 1px solid rgba(255,255,255,.04);\n}\n.callout--warn { border-left-color: var(--clay); background: linear-gradient(180deg, rgba(181,74,47,.08), rgba(53,53,48,.6)); }\n.callout--ok   { border-left-color: var(--sage); background: linear-gradient(180deg, rgba(90,122,90,.08), rgba(53,53,48,.6)); }\n.callout--info { border-left-color: var(--ochre); background: linear-gradient(180deg, rgba(212,147,58,.08), rgba(53,53,48,.6)); }\n\n.callout__label {\n  font-family: var(--font-mono);\n  font-size: 10px;\n  letter-spacing: .14em;\n  text-transform: uppercase;\n  color: var(--stone-light);\n  margin-bottom: 8px;\n}\n.callout--warn .callout__label { color: #e09078; }\n.callout--ok   .callout__label { color: #98b698; }\n.callout--info .callout__label { color: var(--ochre-light); }\n\n.callout__title {\n  font-family: var(--font-display);\n  font-weight: var(--weight-bold);\n  font-size: 20px;\n  line-height: 1.25;\n  margin: 0 0 10px;\n  color: var(--dark-text);\n  letter-spacing: -.01em;\n}\n.callout p {\n  margin: 0;\n  font-size: 15px;\n  line-height: 1.6;\n  color: #c7c2b6;\n}\n.callout p strong { color: var(--dark-text); font-weight: var(--weight-semibold); }\n\n/* ─────────────────────────────────────────────\n   RULE LISTS (Beach + Off-Road)\n   ───────────────────────────────────────────── */\n.rule-list {\n  list-style: none;\n  padding: 0;\n  margin: 24px 0 0;\n  display: flex;\n  flex-direction: column;\n  gap: 1px;\n  background: rgba(255,255,255,.06);\n  border-radius: 8px;\n  overflow: hidden;\n  border: 1px solid rgba(255,255,255,.06);\n}\n.rule-list li {\n  padding: 18px 22px;\n  background: var(--dark-surface);\n  font-size: 15px;\n  line-height: 1.6;\n  color: #c7c2b6;\n  position: relative;\n}\n.rule-list li::before {\n  content: \"\";\n  position: absolute;\n  left: 0; top: 22px;\n  width: 3px; height: 22px;\n  background: var(--ochre);\n  opacity: .4;\n  transition: opacity .2s, height .2s;\n}\n.rule-list li:hover::before { opacity: 1; height: calc(100% - 36px); }\n.rule-list li strong {\n  display: block;\n  color: var(--dark-text);\n  font-family: var(--font-display);\n  font-weight: var(--weight-semibold);\n  font-size: 16px;\n  margin-bottom: 4px;\n  letter-spacing: -.005em;\n}\n.rule-list li em {\n  font-style: italic;\n  color: var(--ochre-light);\n  font-weight: var(--weight-medium);\n}\n\n.inline-link {\n  color: var(--ochre-light);\n  text-decoration: none;\n  font-weight: var(--weight-medium);\n  border-bottom: 1px solid rgba(228,170,85,.4);\n  padding-bottom: 1px;\n  white-space: nowrap;\n  transition: color .15s ease, border-color .15s ease;\n}\n.inline-link:hover {\n  color: var(--pink);\n  border-color: var(--pink);\n}\n\n/* ─────────────────────────────────────────────\n   VIDEO BLOCK (Section 02)\n   ───────────────────────────────────────────── */\n.video-block {\n  margin: 28px 0;\n  background: var(--dark-surface);\n  border: 1px solid rgba(255,255,255,.08);\n  border-radius: 12px;\n  overflow: hidden;\n}\n.video-block__head {\n  padding: 20px 22px 16px;\n  border-bottom: 1px solid rgba(255,255,255,.06);\n}\n.video-block__tag {\n  display: inline-block;\n  font-family: var(--font-mono);\n  font-size: 10px;\n  letter-spacing: .14em;\n  text-transform: uppercase;\n  color: var(--pink);\n  padding: 3px 8px;\n  border-radius: 3px;\n  background: rgba(254,1,157,.1);\n  margin-bottom: 10px;\n}\n.video-block__title {\n  margin: 0 0 6px;\n  font-family: var(--font-display);\n  font-weight: var(--weight-bold);\n  font-size: 22px;\n  letter-spacing: -.01em;\n  color: var(--dark-text);\n}\n.video-block__sub {\n  margin: 0;\n  color: var(--stone-light);\n  font-size: 14.5px;\n  line-height: 1.5;\n}\n\n.video-block__frame {\n  position: relative;\n  aspect-ratio: 16/9;\n  background: #000;\n}\n.video-block__frame iframe {\n  position: absolute;\n  inset: 0;\n  width: 100%;\n  height: 100%;\n  border: 0;\n}\n\n.video-block__status {\n  display: flex;\n  align-items: center;\n  gap: 10px;\n  padding: 14px 22px;\n  font-family: var(--font-mono);\n  font-size: 12px;\n  letter-spacing: .04em;\n  color: var(--stone);\n  border-top: 1px solid rgba(255,255,255,.06);\n}\n.video-block__status-dot {\n  width: 8px; height: 8px; border-radius: 999px;\n  background: var(--stone);\n  flex-shrink: 0;\n}\n.video-block__status[data-state=\"playing\"] .video-block__status-dot {\n  background: var(--ochre);\n  animation: pulse 1.5s ease-in-out infinite;\n}\n.video-block__status[data-state=\"watched\"] {\n  color: var(--sage);\n}\n.video-block__status[data-state=\"watched\"] .video-block__status-dot {\n  background: var(--sage);\n  box-shadow: 0 0 12px rgba(90,122,90,.6);\n}\n\n/* ─────────────────────────────────────────────\n   CHECKLIST\n   ───────────────────────────────────────────── */\n.section--checklist .section__header {\n  border-bottom-color: rgba(254,1,157,.25);\n}\n\n.checklist {\n  display: flex;\n  flex-direction: column;\n  gap: 8px;\n  background: linear-gradient(180deg, rgba(254,1,157,.04) 0%, transparent 100%);\n  padding: 16px;\n  border-radius: 12px;\n  border: 1px dashed rgba(254,1,157,.18);\n}\n\n.check {\n  display: grid;\n  grid-template-columns: auto 1fr;\n  gap: 14px;\n  align-items: flex-start;\n  padding: 16px 18px;\n  background: var(--dark-surface);\n  border: 1px solid rgba(255,255,255,.06);\n  border-radius: 8px;\n  cursor: pointer;\n  transition: border-color .15s ease, background .15s ease, transform .15s ease;\n  position: relative;\n}\n.check input[type=\"checkbox\"] {\n  position: absolute;\n  opacity: 0;\n  pointer-events: none;\n}\n.check:hover {\n  border-color: rgba(212,147,58,.4);\n}\n.check:has(input:checked) {\n  background: linear-gradient(135deg, rgba(90,122,90,.12), rgba(53,53,48,.6));\n  border-color: rgba(90,122,90,.5);\n}\n\n.check__box {\n  width: 24px;\n  height: 24px;\n  border-radius: 5px;\n  border: 1.5px solid rgba(255,255,255,.25);\n  background: rgba(0,0,0,.2);\n  flex-shrink: 0;\n  margin-top: 1px;\n  position: relative;\n  transition: all .15s ease;\n}\n.check:hover .check__box { border-color: var(--ochre); }\n.check:has(input:checked) .check__box {\n  background: var(--sage);\n  border-color: var(--sage);\n}\n.check:has(input:checked) .check__box::after {\n  content: \"\";\n  position: absolute;\n  left: 7px;\n  top: 3px;\n  width: 6px;\n  height: 11px;\n  border: solid #fff;\n  border-width: 0 2.5px 2.5px 0;\n  transform: rotate(45deg);\n}\n\n.check__body { min-width: 0; }\n.check__title {\n  display: block;\n  font-family: var(--font-display);\n  font-weight: var(--weight-semibold);\n  font-size: 16px;\n  line-height: 1.3;\n  color: var(--dark-text);\n  margin-bottom: 4px;\n  letter-spacing: -.005em;\n}\n.check__desc {\n  display: block;\n  font-size: 14px;\n  line-height: 1.55;\n  color: var(--stone-light);\n}\n.check__desc strong { color: var(--dark-text); font-weight: var(--weight-semibold); }\n.check__desc em { color: var(--ochre-light); font-style: italic; }\n\n/* video-tick highlighted state when video has been watched */\n.check[data-check=\"video\"].is-armed {\n  animation: armPulse 1.2s ease-out 1;\n}\n@keyframes armPulse {\n  0%   { box-shadow: 0 0 0 0 rgba(90,122,90,.5); }\n  100% { box-shadow: 0 0 0 14px rgba(90,122,90,0); }\n}\n\n/* ─────────────────────────────────────────────\n   FAQ\n   ───────────────────────────────────────────── */\n.faq { display: flex; flex-direction: column; gap: 1px; background: rgba(255,255,255,.06); border-radius: 8px; overflow: hidden; border: 1px solid rgba(255,255,255,.06); }\n.faq__item { background: var(--dark-surface); }\n.faq__item summary {\n  list-style: none;\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  gap: 16px;\n  padding: 18px 22px;\n  cursor: pointer;\n  font-family: var(--font-display);\n  font-weight: var(--weight-semibold);\n  font-size: 16px;\n  color: var(--dark-text);\n  user-select: none;\n  transition: color .15s ease;\n}\n.faq__item summary::-webkit-details-marker { display: none; }\n.faq__item summary:hover { color: var(--ochre-light); }\n.faq__chev {\n  font-family: var(--font-mono);\n  font-weight: var(--weight-regular);\n  color: var(--ochre);\n  font-size: 22px;\n  line-height: 1;\n  transition: transform .2s ease;\n  flex-shrink: 0;\n}\n.faq__item[open] .faq__chev { transform: rotate(45deg); color: var(--pink); }\n.faq__body {\n  padding: 0 22px 22px;\n  font-size: 14.5px;\n  line-height: 1.6;\n  color: var(--stone-light);\n}\n.faq__body strong { color: var(--dark-text); font-weight: var(--weight-semibold); }\n\n/* ─────────────────────────────────────────────\n   FORM\n   ───────────────────────────────────────────── */\n.form { display: flex; flex-direction: column; gap: 18px; }\n.form__row {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: 18px;\n}\n@media (max-width: 600px) {\n  .form__row { grid-template-columns: 1fr; gap: 18px; }\n}\n\n.field { display: flex; flex-direction: column; gap: 8px; }\n.field__label {\n  font-family: var(--font-mono);\n  font-size: 11px;\n  text-transform: uppercase;\n  letter-spacing: .12em;\n  color: var(--stone);\n  font-weight: var(--weight-medium);\n}\n.field__label em {\n  color: var(--pink);\n  font-style: normal;\n  margin-left: 2px;\n}\n\n.field input[type=\"text\"],\n.field input[type=\"email\"],\n.field input[type=\"tel\"],\n.field textarea {\n  appearance: none;\n  width: 100%;\n  background: var(--dark-surface);\n  border: 1px solid rgba(255,255,255,.1);\n  border-radius: 6px;\n  color: var(--dark-text);\n  font-family: var(--font-body);\n  font-size: 15px;\n  padding: 12px 14px;\n  transition: border-color .15s ease, background .15s ease;\n}\n.field textarea {\n  resize: vertical;\n  min-height: 80px;\n  line-height: 1.5;\n}\n.field input:focus,\n.field textarea:focus {\n  outline: none;\n  border-color: var(--ochre);\n  background: #1f1e1b;\n}\n.field input::placeholder,\n.field textarea::placeholder {\n  color: rgba(184,176,165,.45);\n}\n\n.field--radio {\n  border: 0;\n  padding: 0;\n  margin: 0;\n}\n.field--radio legend { padding: 0; margin-bottom: 8px; }\n.radio-row {\n  display: grid;\n  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));\n  gap: 8px;\n}\n.radio {\n  display: flex;\n  align-items: center;\n  gap: 10px;\n  padding: 12px 14px;\n  background: var(--dark-surface);\n  border: 1px solid rgba(255,255,255,.08);\n  border-radius: 6px;\n  cursor: pointer;\n  font-size: 14px;\n  color: var(--stone-light);\n  transition: border-color .15s ease, color .15s ease, background .15s ease;\n}\n.radio input { accent-color: var(--ochre); flex-shrink: 0; }\n.radio:hover { border-color: rgba(212,147,58,.4); color: var(--dark-text); }\n.radio:has(input:checked) {\n  border-color: var(--ochre);\n  background: rgba(212,147,58,.08);\n  color: var(--dark-text);\n}\n\n/* ─────────────────────────────────────────────\n   ACK + SUBMIT\n   ───────────────────────────────────────────── */\n.section--ack { margin-top: 64px; }\n.check--ack {\n  border-color: rgba(254,1,157,.25);\n  background: linear-gradient(135deg, rgba(254,1,157,.06), rgba(53,53,48,.8));\n  padding: 22px;\n}\n.check--ack .check__title {\n  font-size: 18px;\n}\n.check--ack:has(input:checked) {\n  background: linear-gradient(135deg, rgba(254,1,157,.14), rgba(53,53,48,.8));\n  border-color: var(--pink);\n}\n.check--ack:has(input:checked) .check__box {\n  background: var(--pink);\n  border-color: var(--pink);\n}\n\n.submit-block {\n  margin-top: 28px;\n  text-align: center;\n}\n.submit-btn {\n  appearance: none;\n  border: 0;\n  background: var(--pink);\n  color: #fff;\n  font-family: var(--font-display);\n  font-weight: var(--weight-bold);\n  font-size: 17px;\n  letter-spacing: .08em;\n  text-transform: uppercase;\n  padding: 18px 28px;\n  border-radius: 6px;\n  cursor: pointer;\n  min-width: 280px;\n  display: inline-flex;\n  align-items: center;\n  justify-content: center;\n  gap: 14px;\n  transition: background .2s ease, transform .15s ease, box-shadow .2s ease, opacity .2s ease;\n  box-shadow: 0 8px 28px rgba(254,1,157,.35);\n}\n.submit-btn:hover:not(:disabled) {\n  background: var(--pink-dark);\n  transform: translateY(-1px);\n  box-shadow: 0 12px 32px rgba(254,1,157,.45);\n}\n.submit-btn:active:not(:disabled) { transform: translateY(0) scale(.99); }\n.submit-btn:disabled {\n  background: rgba(255,255,255,.06);\n  color: var(--stone);\n  cursor: not-allowed;\n  box-shadow: none;\n}\n.submit-btn__arrow { transition: transform .2s ease; }\n.submit-btn:hover:not(:disabled) .submit-btn__arrow { transform: translateX(3px); }\n.submit-btn.is-loading { pointer-events: none; opacity: .7; }\n.submit-btn.is-loading .submit-btn__label::after {\n  content: \"…\";\n  animation: dots 1.2s steps(4, end) infinite;\n}\n@keyframes dots {\n  0%, 100% { content: \".\"; }\n  33%      { content: \"..\"; }\n  66%      { content: \"...\"; }\n}\n\n.submit-block__hint {\n  margin-top: 14px;\n  font-family: var(--font-mono);\n  font-size: 12px;\n  color: var(--stone);\n  letter-spacing: .04em;\n}\n.submit-block__hint.is-error { color: #e09078; }\n.submit-block__hint.is-ready { color: var(--sage); }\n\n/* ─────────────────────────────────────────────\n   FOOTER\n   ───────────────────────────────────────────── */\n.footer {\n  background: #1a1a18;\n  padding: 36px 20px 32px;\n  border-top: 1px solid rgba(255,255,255,.06);\n  margin-top: 80px;\n}\n.footer__inner {\n  max-width: 960px;\n  margin: 0 auto;\n  display: flex;\n  flex-direction: column;\n  gap: 14px;\n  text-align: center;\n}\n.footer__brand {\n  font-family: var(--font-display);\n  font-weight: var(--weight-bold);\n  font-size: 22px;\n  letter-spacing: .02em;\n  color: var(--dark-text);\n  text-transform: lowercase;\n}\n.footer__meta {\n  display: flex;\n  flex-wrap: wrap;\n  justify-content: center;\n  gap: 18px;\n  font-family: var(--font-mono);\n  font-size: 12px;\n  color: var(--stone);\n  letter-spacing: .04em;\n}\n.footer__meta a {\n  color: var(--ochre-light);\n  text-decoration: none;\n}\n.footer__meta a:hover { color: var(--pink); }\n.footer__legal {\n  font-size: 11px;\n  color: var(--stone);\n  font-family: var(--font-mono);\n  letter-spacing: .04em;\n}\n\n/* ─────────────────────────────────────────────\n   THANK YOU\n   ───────────────────────────────────────────── */\n.thanks[hidden] { display: none !important; }\n\n.thanks {\n  position: fixed;\n  inset: 0;\n  z-index: var(--z-modal, 100);\n  background: rgba(20,20,18,.92);\n  backdrop-filter: blur(8px);\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  padding: 20px;\n  animation: thanksIn .35s ease-out;\n}\n@keyframes thanksIn {\n  from { opacity: 0; }\n  to   { opacity: 1; }\n}\n.thanks__card {\n  width: 100%;\n  max-width: 520px;\n  background: var(--dark-surface);\n  border: 1px solid rgba(255,255,255,.08);\n  border-radius: 12px;\n  padding: 36px 32px 28px;\n  text-align: center;\n  position: relative;\n  animation: thanksCardIn .45s cubic-bezier(.2,.7,.3,1.2);\n}\n.thanks__x {\n  position: absolute;\n  top: 12px;\n  right: 12px;\n  width: 36px;\n  height: 36px;\n  border-radius: 999px;\n  border: 1px solid rgba(255,255,255,.1);\n  background: rgba(0,0,0,.2);\n  color: var(--stone-light);\n  font-size: 22px;\n  line-height: 1;\n  cursor: pointer;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  padding: 0;\n  transition: background .15s ease, color .15s ease, border-color .15s ease;\n}\n.thanks__x:hover {\n  background: rgba(255,255,255,.08);\n  color: var(--dark-text);\n  border-color: rgba(255,255,255,.2);\n}\n@keyframes thanksCardIn {\n  from { opacity: 0; transform: translateY(20px) scale(.95); }\n  to   { opacity: 1; transform: none; }\n}\n.thanks__stamp {\n  width: 56px; height: 56px;\n  border-radius: 999px;\n  background: var(--sage);\n  color: #fff;\n  display: inline-flex;\n  align-items: center;\n  justify-content: center;\n  font-size: 28px;\n  font-weight: var(--weight-bold);\n  margin: 0 auto 18px;\n  box-shadow: 0 0 0 6px rgba(90,122,90,.18);\n}\n.thanks__title {\n  font-family: var(--font-display);\n  font-weight: var(--weight-bold);\n  font-size: 34px;\n  letter-spacing: -.015em;\n  text-transform: uppercase;\n  margin: 0 0 12px;\n}\n.thanks__lede {\n  color: var(--stone-light);\n  font-size: 15px;\n  line-height: 1.55;\n  margin: 0 0 22px;\n}\n.thanks__summary {\n  text-align: left;\n  background: rgba(0,0,0,.2);\n  border: 1px solid rgba(255,255,255,.06);\n  border-radius: 8px;\n  padding: 14px 16px;\n  margin: 0 0 22px;\n  font-family: var(--font-mono);\n  font-size: 12px;\n  line-height: 1.6;\n  color: var(--stone-light);\n  max-height: 200px;\n  overflow: auto;\n}\n.thanks__summary .row {\n  display: grid;\n  grid-template-columns: 90px 1fr;\n  gap: 12px;\n  padding: 3px 0;\n}\n.thanks__summary .row .k { color: var(--stone); }\n.thanks__summary .row .v { color: var(--dark-text); word-break: break-word; }\n\n.thanks__actions {\n  display: flex;\n  flex-direction: column;\n  gap: 10px;\n}\n.btn {\n  display: inline-flex;\n  align-items: center;\n  justify-content: center;\n  gap: 8px;\n  appearance: none;\n  border: 0;\n  font-family: var(--font-display);\n  font-weight: var(--weight-bold);\n  font-size: 14px;\n  letter-spacing: .08em;\n  text-transform: uppercase;\n  padding: 14px 20px;\n  border-radius: 6px;\n  text-decoration: none;\n  cursor: pointer;\n  transition: background .15s, transform .15s;\n}\n.btn--pink {\n  background: var(--pink);\n  color: #fff;\n}\n.btn--pink:hover { background: var(--pink-dark); }\n.btn--ghost {\n  background: transparent;\n  color: var(--stone-light);\n  border: 1px solid rgba(255,255,255,.12);\n}\n.btn--ghost:hover { background: rgba(255,255,255,.04); color: var(--dark-text); }\n\n.thanks__ref {\n  margin: 14px 0 0;\n  font-family: var(--font-mono);\n  font-size: 10px;\n  color: var(--stone);\n  letter-spacing: .08em;\n}\n\n/* selection */\n::selection {\n  background: var(--pink);\n  color: #fff;\n}\n\n/* ─────────────────────────────────────────────\n   TWEAKS PANEL (floating, hidden until Tweaks on)\n   ───────────────────────────────────────────── */\n.tweaks[hidden] { display: none !important; }\n.tweaks {\n  position: fixed;\n  right: 20px;\n  bottom: 20px;\n  width: 280px;\n  max-width: calc(100vw - 40px);\n  background: rgba(28, 28, 25, 0.96);\n  backdrop-filter: blur(16px) saturate(140%);\n  -webkit-backdrop-filter: blur(16px) saturate(140%);\n  border: 1px solid rgba(255,255,255,.1);\n  border-radius: 12px;\n  box-shadow: 0 24px 60px rgba(0,0,0,.5);\n  z-index: 200;\n  color: var(--dark-text);\n  font-family: var(--font-body);\n  animation: tweaksIn .25s ease-out;\n}\n@keyframes tweaksIn {\n  from { opacity: 0; transform: translateY(6px); }\n  to   { opacity: 1; transform: none; }\n}\n.tweaks__head {\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  padding: 12px 14px 10px;\n  border-bottom: 1px solid rgba(255,255,255,.08);\n}\n.tweaks__head h3 {\n  margin: 0;\n  font-family: var(--font-display);\n  font-size: 13px;\n  font-weight: var(--weight-semibold);\n  letter-spacing: .14em;\n  text-transform: uppercase;\n  color: var(--pink);\n}\n.tweaks__head button {\n  appearance: none;\n  background: none;\n  border: 0;\n  color: var(--stone-light);\n  font-size: 20px;\n  line-height: 1;\n  cursor: pointer;\n  padding: 4px 8px;\n  border-radius: 4px;\n  transition: color .15s, background .15s;\n}\n.tweaks__head button:hover {\n  color: var(--dark-text);\n  background: rgba(255,255,255,.06);\n}\n.tweaks__body {\n  padding: 14px 14px 16px;\n  display: flex;\n  flex-direction: column;\n  gap: 14px;\n  max-height: 70vh;\n  overflow-y: auto;\n}\n.tweaks__group { display: flex; flex-direction: column; gap: 8px; }\n.tweaks__label {\n  font-family: var(--font-mono);\n  font-size: 10px;\n  letter-spacing: .14em;\n  text-transform: uppercase;\n  color: var(--stone);\n  font-weight: var(--weight-medium);\n}\n.tweaks__row {\n  display: flex;\n  flex-wrap: wrap;\n  gap: 6px;\n}\n.tweaks__row--seg {\n  border: 1px solid rgba(255,255,255,.1);\n  border-radius: 6px;\n  padding: 3px;\n  gap: 2px;\n}\n.tweaks__swatch,\n.tweaks__color,\n.tweaks__seg {\n  appearance: none;\n  border: 1px solid rgba(255,255,255,.1);\n  background: rgba(0,0,0,.2);\n  color: var(--dark-text);\n  cursor: pointer;\n  font-family: inherit;\n  transition: border-color .15s, background .15s, transform .1s;\n}\n.tweaks__swatch:active,\n.tweaks__color:active,\n.tweaks__seg:active { transform: scale(.96); }\n\n.tweaks__swatch {\n  width: 38px;\n  height: 38px;\n  border-radius: 8px;\n  font-size: 20px;\n  line-height: 1;\n  display: inline-flex;\n  align-items: center;\n  justify-content: center;\n}\n.tweaks__swatch:hover { border-color: rgba(212,147,58,.4); background: rgba(212,147,58,.06); }\n.tweaks__swatch.is-active {\n  border-color: var(--pink);\n  background: rgba(254,1,157,.12);\n  box-shadow: 0 0 0 1px rgba(254,1,157,.5);\n}\n\n.tweaks__color {\n  width: 36px;\n  height: 36px;\n  border-radius: 999px;\n  background: var(--c);\n  position: relative;\n}\n.tweaks__color::after {\n  content: \"\";\n  position: absolute;\n  inset: -4px;\n  border-radius: 999px;\n  border: 2px solid transparent;\n  transition: border-color .15s;\n}\n.tweaks__color.is-active::after {\n  border-color: var(--c);\n}\n\n.tweaks__seg {\n  flex: 1;\n  border: 0;\n  background: transparent;\n  padding: 8px 10px;\n  border-radius: 4px;\n  font-size: 12px;\n  font-family: var(--font-mono);\n  letter-spacing: .04em;\n  color: var(--stone-light);\n}\n.tweaks__seg:hover { color: var(--dark-text); background: rgba(255,255,255,.04); }\n.tweaks__seg.is-active {\n  background: var(--pink);\n  color: #fff;\n}\n\n<\u002Fstyle>\n\n  <!-- bundler splash / no-JS fallback -->\n  \n<\u002Fhead>\n<body>\n\n  <!-- ────────────────────────────────────────────\n       STICKY TOP BAR — wordmark + progress + submit\n       ──────────────────────────────────────────── -->\n  <header class=\"topbar\" data-screen-label=\"Topbar\">\n    <a class=\"topbar__brand\" href=\"https://www.vamuz.au\" aria-label=\"Vamuz home\">\n      <img src=\"0b630292-7e64-45e0-90f5-dd49588c4cd8\" alt=\"Vamuz\">\n    <\u002Fa>\n    <div class=\"topbar__progress\" aria-hidden=\"true\">\n      <div class=\"topbar__progress-track\">\n        <div class=\"topbar__progress-fill\" id=\"progressFill\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"topbar__progress-label\">\n        <span id=\"progressCount\">0<\u002Fspan> / <span id=\"progressTotal\">11<\u002Fspan>\n        <span class=\"topbar__progress-caption\">checked<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <button type=\"button\" class=\"topbar__cta\" id=\"topbarSubmit\" disabled=\"\" aria-disabled=\"true\">\n      Submit Briefing\n    <\u002Fbutton>\n  <\u002Fheader>\n\n  <!-- ────────────────────────────────────────────\n       HERO\n       ──────────────────────────────────────────── -->\n  <section class=\"hero\" data-screen-label=\"Hero\">\n    <div class=\"hero__grid\">\n      <div class=\"hero__copy\">\n        <div class=\"hero__eyebrow\">\n          <span class=\"dot\" aria-hidden=\"true\"><\u002Fspan>\n          Off-Road Briefing&nbsp;·&nbsp;Required before pickup\n        <\u002Fdiv>\n        <h1 class=\"hero__title\">\n          <span style=\"font-family: sans-serif\">Vamuz II<\u002Fspan>\n          <span class=\"hero__title-accent\" style=\"font-family: sans-serif\">Off-Road<\u002Fspan>\n          <span style=\"font-family: sans-serif\">Pre-Trip<\u002Fspan>\n        <\u002Fh1>\n        <p class=\"hero__lede\">\n          Before you take Vamuz II off the beaten track, work through this briefing.\n          It protects you, it protects the vehicle, and it means we can focus on\n          the good stuff at pickup.\n        <\u002Fp>\n        <ul class=\"hero__meta\">\n          <li><span class=\"hero__meta-key\">Vehicle<\u002Fspan><span class=\"hero__meta-val\">GWM Cannon XSR<\u002Fspan><\u002Fli>\n          <li><span class=\"hero__meta-key\">Drive<\u002Fspan><span class=\"hero__meta-val\">4×4 · 4H / 4L<\u002Fspan><\u002Fli>\n          <li><span class=\"hero__meta-key\">Sections<\u002Fspan><span class=\"hero__meta-val\">04<\u002Fspan><\u002Fli>\n          <li><span class=\"hero__meta-key\">Time<\u002Fspan><span class=\"hero__meta-val\">~8 min<\u002Fspan><\u002Fli>\n          <li><span class=\"hero__meta-key\">Status<\u002Fspan><span class=\"hero__meta-val hero__meta-val--accent\" id=\"heroStatus\">Incomplete<\u002Fspan><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n\n      <figure class=\"hero__photo\" aria-label=\"Vamuz II crossing a creek in the Sunshine Coast hinterland\">\n        <div class=\"hero__photo-frame\">\n          <img src=\"77e0a51d-1b5a-44e0-887b-4764dd889add\" alt=\"Vamuz II — GWM Cannon XSR fording a creek\">\n          <span class=\"hero__photo-corner hero__photo-corner--tl\"><\u002Fspan>\n          <span class=\"hero__photo-corner hero__photo-corner--tr\"><\u002Fspan>\n          <span class=\"hero__photo-corner hero__photo-corner--bl\"><\u002Fspan>\n          <span class=\"hero__photo-corner hero__photo-corner--br\"><\u002Fspan>\n          <div class=\"hero__photo-stamp\">\n            <span class=\"hero__photo-stamp-label\">Vamuz II<\u002Fspan>\n            <span class=\"hero__photo-stamp-sub\">GWM Cannon XSR&nbsp;·&nbsp;QLD&nbsp;890·PX6<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Ffigure>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <main class=\"container\">\n\n    <!-- ────────────────────────────────────────────\n         01 — KNOW THE VEHICLE\n         ──────────────────────────────────────────── -->\n    <section class=\"section\" id=\"section-vehicle\" data-screen-label=\"01 Know the Vehicle\">\n      <header class=\"section__header\">\n        <span class=\"section__num\">01<\u002Fspan>\n        <div class=\"section__head-text\">\n          <h2 class=\"section__title\">Know the Vehicle<\u002Fh2>\n          <p class=\"section__kicker\">Tap any card. It's short, promise.<\u002Fp>\n        <\u002Fdiv>\n        <button type=\"button\" class=\"section__expand\" data-expand-target=\"vehicle-cards\">\n          <span data-expand-label=\"\">Open all<\u002Fspan>\n        <\u002Fbutton>\n      <\u002Fheader>\n\n      <p class=\"section__intro\">Vamuz II is a 2025 GWM Cannon XSR 4×4 ute with a full camper canopy fitout. It's brand new — we'd love to keep it in great condition for all of our hires. Capable rig, but the way you drive it determines what comes home intact.<\u002Fp>\n\n      <div class=\"card-grid\" data-expand-group=\"vehicle-cards\">\n\n        <details class=\"card-acc card-acc--emoji\">\n          <summary>\n            <span class=\"card-acc__icon\" aria-hidden=\"true\">🎚️<\u002Fspan>\n            <span class=\"card-acc__head\">\n              <span class=\"card-acc__title\">Pick your driveline<\u002Fspan>\n              <span class=\"card-acc__teaser\">2H · 4H · 4L — and when each one belongs<\u002Fspan>\n            <\u002Fspan>\n            <span class=\"card-acc__chev\" aria-hidden=\"true\">+<\u002Fspan>\n          <\u002Fsummary>\n          <div class=\"card-acc__body\">\n            <p>\n              <strong>2H<\u002Fstrong> — all sealed roads.<br>\n              <strong>4H<\u002Fstrong> — dirt, gravel, beach, unsealed tracks.<br>\n              <strong>4L<\u002Fstrong> — extreme only. Steep rocky climbs, deep bog, slow technical sections.\n            <\u002Fp>\n            <p class=\"card-acc__tip\">\n              ⚡ Switch is on the centre console. Select the right mode <em>before<\u002Fem> you need traction, not after.\n            <\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdetails>\n\n        <details class=\"card-acc card-acc--emoji\">\n          <summary>\n            <span class=\"card-acc__icon\" aria-hidden=\"true\">🏖️<\u002Fspan>\n            <span class=\"card-acc__head\">\n              <span class=\"card-acc__title\">7 terrain modes — two that matter<\u002Fspan>\n              <span class=\"card-acc__teaser\">Sand for beach. Mud for bogs. Normal for everything else.<\u002Fspan>\n            <\u002Fspan>\n            <span class=\"card-acc__chev\" aria-hidden=\"true\">+<\u002Fspan>\n          <\u002Fsummary>\n          <div class=\"card-acc__body\">\n            <p>Normal · Eco · Sport · Snow · <strong>Mud<\u002Fstrong> · <strong>Sand<\u002Fstrong> · Expert.<\u002Fp>\n            <p>\n              <strong>Sand<\u002Fstrong> is your go-to for beach — select it alongside 4H\n              before hitting soft sand. <strong>Mud<\u002Fstrong> for boggy tracks.\n              Expert gives full manual control — only if you know what you're doing.\n            <\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdetails>\n\n        <details class=\"card-acc card-acc--emoji\">\n          <summary>\n            <span class=\"card-acc__icon\" aria-hidden=\"true\">💨<\u002Fspan>\n            <span class=\"card-acc__head\">\n              <span class=\"card-acc__title\">Air down for sand<\u002Fspan>\n              <span class=\"card-acc__teaser\">16–20 PSI in soft sand. Back to 40 on tarmac.<\u002Fspan>\n            <\u002Fspan>\n            <span class=\"card-acc__chev\" aria-hidden=\"true\">+<\u002Fspan>\n          <\u002Fsummary>\n          <div class=\"card-acc__body\">\n            <p>\n              Drop to <strong>16–20&nbsp;PSI<\u002Fstrong> for sand. TPMS on the dash shows\n              live pressure. Compressor and deflator live in the recovery bag.\n            <\u002Fp>\n            <p class=\"card-acc__warn\">\n              ⚠ Reinflate to <strong>40&nbsp;PSI<\u002Fstrong> before sealed roads.\n              Driving low on tarmac damages tyres and you'll be charged.\n            <\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdetails>\n\n        <details class=\"card-acc card-acc--emoji\">\n          <summary>\n            <span class=\"card-acc__icon\" aria-hidden=\"true\">🐢<\u002Fspan>\n            <span class=\"card-acc__head\">\n              <span class=\"card-acc__title\">Crawl &amp; Turn Assist<\u002Fspan>\n              <span class=\"card-acc__teaser\">The car drives. You just steer.<\u002Fspan>\n            <\u002Fspan>\n            <span class=\"card-acc__chev\" aria-hidden=\"true\">+<\u002Fspan>\n          <\u002Fsummary>\n          <div class=\"card-acc__body\">\n            <p>\n              <strong>Crawl Mode<\u002Fstrong> manages throttle and braking for technical\n              terrain — perfect for steep descents and rock sections. Engage in 4L\n              via the console.\n            <\u002Fp>\n            <p>\n              <strong>Turn Assist<\u002Fstrong> brakes the inside rear wheel in 4L to\n              tighten the turning circle. Don't use it on harder surfaces.\n            <\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdetails>\n\n        <details class=\"card-acc card-acc--emoji\">\n          <summary>\n            <span class=\"card-acc__icon\" aria-hidden=\"true\">🌉<\u002Fspan>\n            <span class=\"card-acc__head\">\n              <span class=\"card-acc__title\">2.3 m up top<\u002Fspan>\n              <span class=\"card-acc__teaser\">Under any bridge. Measure again if you load the roof.<\u002Fspan>\n            <\u002Fspan>\n            <span class=\"card-acc__chev\" aria-hidden=\"true\">+<\u002Fspan>\n          <\u002Fsummary>\n          <div class=\"card-acc__body\">\n            <p>\n              Canopy sits at <strong>2.3&nbsp;m<\u002Fstrong>. Fine under any bridge or car park.\n              With surfboards or other roof gear loaded, <strong>measure before<\u002Fstrong>\n              entering low-clearance areas.\n            <\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdetails>\n\n        <details class=\"card-acc card-acc--emoji\">\n          <summary>\n            <span class=\"card-acc__icon\" aria-hidden=\"true\">🪢<\u002Fspan>\n            <span class=\"card-acc__head\">\n              <span class=\"card-acc__title\">Recovery gear is on board<\u002Fspan>\n              <span class=\"card-acc__teaser\">Boards · strap · compressor. Ask for a walkthrough.<\u002Fspan>\n            <\u002Fspan>\n            <span class=\"card-acc__chev\" aria-hidden=\"true\">+<\u002Fspan>\n          <\u002Fsummary>\n          <div class=\"card-acc__body\">\n            <p>\n              Recovery boards (MaxTrax-style), tow strap, and compressor packed\n              in the canopy.\n            <\u002Fp>\n            <p class=\"card-acc__tip\">\n              💬 Ask for a walkthrough at pickup if you haven't used recovery gear before —\n              knowing how to use it <em>before<\u002Fem> you need it is half the battle.\n            <\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdetails>\n\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ────────────────────────────────────────────\n         02 — BEACH DRIVING\n         ──────────────────────────────────────────── -->\n    <section class=\"section\" id=\"section-beach\" data-screen-label=\"02 Beach Driving\">\n      <header class=\"section__header\">\n        <span class=\"section__num\">02<\u002Fspan>\n        <div class=\"section__head-text\">\n          <h2 class=\"section__title\">Beach Driving<\u002Fh2>\n          <p class=\"section__kicker\">Capable with prep. Not covered if it goes wrong.<\u002Fp>\n        <\u002Fdiv>\n        <button type=\"button\" class=\"section__expand\" data-expand-target=\"beach-rules\">\n          <span data-expand-label=\"\">Open all<\u002Fspan>\n        <\u002Fbutton>\n      <\u002Fheader>\n\n      <div class=\"callout callout--warn\">\n        <div class=\"callout__label\">⚠&nbsp;&nbsp;Liability notice<\u002Fdiv>\n        <h3 class=\"callout__title\">Beach driving is not covered by MyWay Protect.<\u002Fh3>\n        <p>\n          The MyWay Protect PDS (Exclusion 25) explicitly excludes damage caused\n          by the actions or movement of the sea, including tidal events and\n          storm surge. Beach driving also falls outside the off-road protection\n          definition, which only covers gazetted unsealed roads and recognised\n          campsite access tracks. <strong>If the vehicle is damaged on the beach,\n          you are personally liable.<\u002Fstrong>\n        <\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"callout callout--ok\">\n        <div class=\"callout__label\">✓&nbsp;&nbsp;Capability<\u002Fdiv>\n        <h3 class=\"callout__title\">Vamuz II is beach capable — with preparation.<\u002Fh3>\n        <p>\n          K'gari (Fraser Island), Teewah Beach, Double Island Point, Inskip —\n          all doable. You just need to go in prepared: tyre pressure, tide\n          awareness, momentum, and knowing when to stop. Watch the video below\n          before you go.\n        <\u002Fp>\n      <\u002Fdiv>\n\n      <!-- Video block — counts toward the watched-video tick -->\n      <div class=\"video-block\" id=\"videoBlock\">\n        <div class=\"video-block__head\">\n          <span class=\"video-block__tag\">Watch in full · ~5 min<\u002Fspan>\n          <h3 class=\"video-block__title\">Beach Driving Guide<\u002Fh3>\n          <p class=\"video-block__sub\">\n            Tyre pressure, soft-sand technique, recovery, and what to do if you\n            get bogged. Mandatory before any beach driving.\n          <\u002Fp>\n        <\u002Fdiv>\n        <div class=\"video-block__frame\">\n          <iframe id=\"beachVideo\" src=\"https://www.youtube.com/embed/Ioa3lGvi8AE?enablejsapi=1&amp;rel=0&amp;modestbranding=1&amp;playsinline=1\" title=\"Beach Driving Tip for Your Vamuz Camper Hire\" frameborder=\"0\" referrerpolicy=\"strict-origin-when-cross-origin\" allow=\"accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share\" allowfullscreen=\"\"><\u002Fiframe>\n        <\u002Fdiv>\n        <div class=\"video-block__status\" id=\"videoStatus\" data-state=\"idle\">\n          <span class=\"video-block__status-dot\" aria-hidden=\"true\"><\u002Fspan>\n          <span class=\"video-block__status-text\">Not started<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <h3 class=\"rules-heading\">Beach driving rules<\u002Fh3>\n      <div class=\"rule-acc\" data-expand-group=\"beach-rules\">\n        <details class=\"rule-acc__item\">\n          <summary>\n            <span class=\"rule-acc__icon\" aria-hidden=\"true\">🏖️<\u002Fspan>\n            <span class=\"rule-acc__title\">Always check tides before you drive<\u002Fspan>\n            <span class=\"rule-acc__chev\" aria-hidden=\"true\">+<\u002Fspan>\n          <\u002Fsummary>\n          <div class=\"rule-acc__body\">\n            Never drive at high tide. Give yourself a buffer. A tidal chart for\n            your destination is easy to pull up on your phone — do it the night before.\n            <a class=\"inline-link\" href=\"https://tides.willyweather.com.au/qld.html\" target=\"_blank\" rel=\"noopener\">Willy Weather QLD tides ↗<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdetails>\n\n        <details class=\"rule-acc__item\">\n          <summary>\n            <span class=\"rule-acc__icon\" aria-hidden=\"true\">🛞<\u002Fspan>\n            <span class=\"rule-acc__title\">Deflate before you hit the sand<\u002Fspan>\n            <span class=\"rule-acc__chev\" aria-hidden=\"true\">+<\u002Fspan>\n          <\u002Fsummary>\n          <div class=\"rule-acc__body\">\n            16–20&nbsp;PSI minimum. Don't try to drive soft sand at road pressure —\n            you will bog. Compressor is in the canopy for re-inflation.\n          <\u002Fdiv>\n        <\u002Fdetails>\n\n        <details class=\"rule-acc__item\">\n          <summary>\n            <span class=\"rule-acc__icon\" aria-hidden=\"true\">🛻<\u002Fspan>\n            <span class=\"rule-acc__title\">Keep momentum<\u002Fspan>\n            <span class=\"rule-acc__chev\" aria-hidden=\"true\">+<\u002Fspan>\n          <\u002Fsummary>\n          <div class=\"rule-acc__body\">\n            Soft sand is not the place to stop and think. Pick your line, commit,\n            keep moving. If you feel the vehicle sinking, steer out gently —\n            don't floor it.\n          <\u002Fdiv>\n        <\u002Fdetails>\n\n        <details class=\"rule-acc__item\">\n          <summary>\n            <span class=\"rule-acc__icon\" aria-hidden=\"true\">🌊<\u002Fspan>\n            <span class=\"rule-acc__title\">No saltwater submersion<\u002Fspan>\n            <span class=\"rule-acc__chev\" aria-hidden=\"true\">+<\u002Fspan>\n          <\u002Fsummary>\n          <div class=\"rule-acc__body\">\n            Don't drive through tidal channels unless you know the depth.\n            Saltwater damage to the underbody, electronics, or diff is expensive\n            and 100% your liability.\n          <\u002Fdiv>\n        <\u002Fdetails>\n\n        <details class=\"rule-acc__item\">\n          <summary>\n            <span class=\"rule-acc__icon\" aria-hidden=\"true\">🚿<\u002Fspan>\n            <span class=\"rule-acc__title\">Clean the underbody after sand driving<\u002Fspan>\n            <span class=\"rule-acc__chev\" aria-hidden=\"true\">+<\u002Fspan>\n          <\u002Fsummary>\n          <div class=\"rule-acc__body\">\n            Salt and sand destroy things slowly. When you return to sealed roads,\n            an underbody rinse at a carwash or hose is genuinely appreciated.\n          <\u002Fdiv>\n        <\u002Fdetails>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ────────────────────────────────────────────\n         03 — OFF-ROAD RULES\n         ──────────────────────────────────────────── -->\n    <section class=\"section\" id=\"section-rules\" data-screen-label=\"03 Off-Road Rules\">\n      <header class=\"section__header\">\n        <span class=\"section__num\">03<\u002Fspan>\n        <div class=\"section__head-text\">\n          <h2 class=\"section__title\">Off-Road Rules<\u002Fh2>\n          <p class=\"section__kicker\">Drive to the conditions. Slow beats stupid.<\u002Fp>\n        <\u002Fdiv>\n        <button type=\"button\" class=\"section__expand\" data-expand-target=\"offroad-rules\">\n          <span data-expand-label=\"\">Open all<\u002Fspan>\n        <\u002Fbutton>\n      <\u002Fheader>\n\n      <p class=\"section__intro\">\n        Under the MyWay Protect PDS, off-road cover for Premium Members applies\n        to <strong>gazetted unsealed roads and access tracks to recognised\n        camping grounds under 20&nbsp;km in length<\u002Fstrong> that are in good\n        condition for 4WD access. Cover does not extend to suspension or\n        drivetrain components — read: don't try to flex the axles on a boulder garden.\n      <\u002Fp>\n\n      <div class=\"callout callout--info\">\n        <div class=\"callout__label\">📋&nbsp;&nbsp;Heads up<\u002Fdiv>\n        <h3 class=\"callout__title\">Tell us your destinations in advance.<\u002Fh3>\n        <p>\n          Let us know if you're planning to access dirt roads or 4WD tracks. We\n          can confirm what's accessible for Vamuz II and whether there are\n          current closures or embargos on the MyWay Protect website. Takes\n          2 minutes and saves a lot of grief — there's a field for it below.\n        <\u002Fp>\n      <\u002Fdiv>\n\n      <h3 class=\"rules-heading\">The rules<\u002Fh3>\n      <div class=\"rule-acc\" data-expand-group=\"offroad-rules\">\n        <details class=\"rule-acc__item\">\n          <summary>\n            <span class=\"rule-acc__icon\" aria-hidden=\"true\">🌿<\u002Fspan>\n            <span class=\"rule-acc__title\">Scratched panels &amp; wheel damage<\u002Fspan>\n            <span class=\"rule-acc__chev\" aria-hidden=\"true\">+<\u002Fspan>\n          <\u002Fsummary>\n          <div class=\"rule-acc__body\">\n            Tree branches, narrow tracks, reversing into scrub — the most common\n            causes of damage on off-road hires. Go slow, get out and walk the\n            line first if you're unsure. <em>A slow and careful line beats a rushed one every time.<\u002Fem>\n          <\u002Fdiv>\n        <\u002Fdetails>\n\n        <details class=\"rule-acc__item\">\n          <summary>\n            <span class=\"rule-acc__icon\" aria-hidden=\"true\">🛞<\u002Fspan>\n            <span class=\"rule-acc__title\">Tyres<\u002Fspan>\n            <span class=\"rule-acc__chev\" aria-hidden=\"true\">+<\u002Fspan>\n          <\u002Fsummary>\n          <div class=\"rule-acc__body\">\n            Punctures from rocks and tracks are not covered (PDS Exclusion 15).\n            Carry the spare and know where the jack is. We'll go through this at pickup.\n          <\u002Fdiv>\n        <\u002Fdetails>\n\n        <details class=\"rule-acc__item\">\n          <summary>\n            <span class=\"rule-acc__icon\" aria-hidden=\"true\">❌<\u002Fspan>\n            <span class=\"rule-acc__title\">Reckless use voids cover<\u002Fspan>\n            <span class=\"rule-acc__chev\" aria-hidden=\"true\">+<\u002Fspan>\n          <\u002Fsummary>\n          <div class=\"rule-acc__body\">\n            The PDS excludes damage from reckless use off-road — river crossings\n            without checking depth, trails outside the vehicle's capability,\n            ignoring regional access embargos.\n          <\u002Fdiv>\n        <\u002Fdetails>\n\n        <details class=\"rule-acc__item\">\n          <summary>\n            <span class=\"rule-acc__icon\" aria-hidden=\"true\">🪪<\u002Fspan>\n            <span class=\"rule-acc__title\">Access permits<\u002Fspan>\n            <span class=\"rule-acc__chev\" aria-hidden=\"true\">+<\u002Fspan>\n          <\u002Fsummary>\n          <div class=\"rule-acc__body\">\n            National parks like K'gari and Teewah require a vehicle access perm
